<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .download-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        
        .download-prompt a {
            color: #667eea;
            text-decoration: underline;
            margin-left: 8px;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
        
        .retry-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 钱包授权</h1>
            <div class="subtitle">选择链和钱包，完成授权操作</div>
            
            <!-- 链选择 -->
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn" data-chain="728126428">TRON</button>
            </div>
            
            <!-- 钱包列表 -->
            <div class="wallet-list" id="walletList">
                <!-- 动态渲染 -->
            </div>
            
            <!-- 授权按钮 -->
            <button class="approve-btn" id="approveBtn">打开钱包授权</button>
            
            <!-- 状态显示 -->
            <div class="status hidden" id="status"></div>
        </div>
    </div>
    
    <div id="downloadPrompt" class="download-prompt hidden"></div>

    <script>
        // ==================== 配置 ====================
        const wallets = {
            metamask: {
                name: 'MetaMask',
                icon: '🦊',
                scheme: 'metamask://',
                download: {
                    ios: 'https://apps.apple.com/app/metamask/id1438144202',
                    android: 'https://play.google.com/store/apps/details?id=io.metamask',
                    fallback: 'https://metamask.io/download/'
                },
                chains: ['evm']
            },
            tokenpocket: {
                name: 'TokenPocket',
                icon: '🎫',
                scheme: 'tp://',
                download: {
                    ios: 'https://apps.apple.com/app/tokenpocket/id1389003581',
                    android: 'https://play.google.com/store/apps/details?id=com.vpaly.tokenpocket',
                    fallback: 'https://www.tokenpocket.pro/'
                },
                chains: ['evm', 'tron']
            },
            imtoken: {
                name: 'imToken',
                icon: '🔷',
                scheme: 'imtokenv2://',
                download: {
                    ios: 'https://apps.apple.com/app/imtoken/id1384798940',
                    android: 'https://play.google.com/store/apps/details?id=im.token.app',
                    fallback: 'https://token.im/'
                },
                chains: ['evm', 'tron']
            },
            trust: {
                name: 'Trust Wallet',
                icon: '🔒',
                scheme: 'trust://',
                download: {
                    ios: 'https://apps.apple.com/app/trust-wallet/id1288339409',
                    android: 'https://play.google.com/store/apps/details?id=com.wallet.crypto.trustapp',
                    fallback: 'https://trustwallet.com/download'
                },
                chains: ['evm']
            },
            tronlink: {
                name: 'TronLink',
                icon: '🌊',
                scheme: 'tronlink://',
                download: {
                    ios: 'https://apps.apple.com/app/tronlink/id1514876309',
                    android: 'https://play.google.com/store/apps/details?id=com.tronlinkapp.wallet',
                    fallback: 'https://www.tronlink.org/'
                },
                chains: ['tron']
            }
        };
        
        // 当前状态
        let currentChain = '1';
        let selectedWallet = null;
        let pendingDeepLink = null;
        
        // ==================== 工具函数 ====================
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function showDownloadPrompt(wallet) {
            const prompt = document.getElementById('downloadPrompt');
            const downloadUrl = getDownloadUrl(wallet);
            prompt.innerHTML = `
                检测到未成功打开 ${wallet.name}<br>
                请确保已安装钱包<br>
                <a href="${downloadUrl}" target="_blank" style="display: inline-block; margin-top: 8px; color: #667eea;">点击下载钱包</a>
                <span style="margin-left: 12px; cursor: pointer;" onclick="closeDownloadPrompt()">✕</span>
            `;
            prompt.classList.remove('hidden');
            
            setTimeout(() => {
                closeDownloadPrompt();
            }, 8000);
        }
        
        function closeDownloadPrompt() {
            document.getElementById('downloadPrompt').classList.add('hidden');
        }
        
        function getDownloadUrl(wallet) {
            const ua = navigator.userAgent;
            if (/iPhone|iPad/i.test(ua)) {
                return wallet.download.ios;
            } else if (/Android/i.test(ua)) {
                return wallet.download.android;
            }
            return wallet.download.fallback;
        }
        
        // 检测是否移动端
        function isMobile() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // ==================== 唤起钱包（不检测是否安装，直接尝试） ====================
        function openWallet() {
            if (!selectedWallet) {
                showStatus('请先选择一个钱包', 'error');
                return;
            }
            
            const wallet = wallets[selectedWallet];
            const chainId = parseInt(currentChain);
            const chainType = chainId === 728126428 ? 'tron' : 'evm';
            
            // 检查钱包是否支持当前链
            if (!wallet.chains.includes(chainType)) {
                showStatus(`${wallet.name} 不支持 ${chainId === 728126428 ? 'TRON' : chainId === 56 ? 'BNB Chain' : 'Ethereum'}`, 'error');
                return;
            }
            
            showStatus(`正在尝试打开 ${wallet.name}...`, 'loading');
            
            // 直接尝试唤起
            const deepLink = `${wallet.scheme}`;
            pendingDeepLink = deepLink;
            
            // 记录开始时间
            const startTime = Date.now();
            
            // 尝试唤起
            window.location.href = deepLink;
            
            // 设置一个定时器，如果页面没有离开，说明可能没有安装钱包
            setTimeout(() => {
                const elapsed = Date.now() - startTime;
                // 如果页面仍然可见，说明没有被唤起
                if (!document.hidden && !document.webkitHidden && elapsed > 2000) {
                    hideStatus();
                    showDownloadPrompt(wallet);
                } else {
                    // 页面被隐藏了，说明成功唤起
                    showStatus('已唤起钱包，请在钱包中完成操作', 'success');
                }
            }, 2500);
        }
        
        // ==================== UI 渲染 ====================
        function renderWalletList() {
            const chainId = parseInt(currentChain);
            const chainType = chainId === 728126428 ? 'tron' : 'evm';
            
            const supportedWallets = Object.entries(wallets)
                .filter(([_, config]) => config.chains.includes(chainType))
                .map(([key, config]) => ({ key, ...config }));
            
            const container = document.getElementById('walletList');
            container.innerHTML = supportedWallets.map(wallet => `
                <div class="wallet-item" data-wallet="${wallet.key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">${wallet.chains.join(', ')}</div>
                    </div>
                </div>
            `).join('');
            
            // 绑定点击事件
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', () => {
                    const walletKey = item.dataset.wallet;
                    selectedWallet = walletKey;
                    
                    // 高亮选中
                    document.querySelectorAll('.wallet-item').forEach(w => {
                        w.classList.remove('selected');
                    });
                    item.classList.add('selected');
                    
                    hideStatus();
                });
            });
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    selectedWallet = null;
                    renderWalletList();
                    hideStatus();
                });
            });
            
            // 默认激活 Ethereum
            document.querySelector('.chain-btn[data-chain="1"]').classList.add('active');
            
            // 授权按钮
            document.getElementById('approveBtn').addEventListener('click', openWallet);
            
            // 渲染钱包列表
            renderWalletList();
            
            // 移动端提示
            if (!isMobile()) {
                showStatus('请使用手机访问此页面以获得最佳体验', 'error');
            }
        }
        
        // 启动
        init();
    </script>
</body>
</html>
